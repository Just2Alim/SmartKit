services:
  ollama:
    image: ollama/ollama:latest
    gpus: all
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_ORIGINS: "*"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_NUM_CTX_MAX:-4096}
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_LOAD_TIMEOUT: 10m
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:latest}
    entrypoint: /bin/sh
    command: >
      -lc 'until ollama list >/dev/null 2>&1; do sleep 2; done;
      ollama pull "$$OLLAMA_MODEL"'
    volumes:
      - ollama-data:/root/.ollama
    restart: "no"

  ollama-warmup:
    image: node:24-alpine
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:latest}
    command:
      - node
      - -e
      - >
        fetch('http://ollama:11434/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            model: process.env.OLLAMA_MODEL || 'qwen3:latest',
            messages: [
              {role: 'system', content: 'Warm up SmartKit AI. Answer with OK.'},
              {role: 'user', content: 'OK'}
            ],
            stream: false,
            keep_alive: '24h',
            options: {num_predict: 64, num_ctx: 2048, temperature: 0}
          })
        }).then((response) => {
          if (!response.ok) throw new Error('warmup failed: ' + response.status);
          return response.text();
        }).then(() => console.log('Ollama model warmed')).catch((error) => {
          console.error(error);
          process.exit(1);
        });
    restart: "no"

  ollama-proxy:
    image: node:24-alpine
    working_dir: /app
    command: node scripts/ollama_proxy.mjs
    ports:
      - "127.0.0.1:${OLLAMA_PROXY_PORT:-11500}:11500"
    environment:
      HOST: 0.0.0.0
      PORT: 11500
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_PROXY_TOKEN: ${OLLAMA_PROXY_TOKEN}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
      OLLAMA_PROXY_NUM_CTX_MAX: ${OLLAMA_NUM_CTX_MAX:-4096}
      OLLAMA_PROXY_NUM_PREDICT_MAX: ${OLLAMA_NUM_PREDICT_MAX:-1200}
    volumes:
      - ./scripts:/app/scripts:ro
    depends_on:
      ollama-warmup:
        condition: service_completed_successfully
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://ollama-proxy:11500
    depends_on:
      - ollama-proxy
    restart: unless-stopped

volumes:
  ollama-data:
